name: Keepalive — voorkom dat scheduled workflows worden uitgeschakeld

on:
  schedule:
    - cron: '0 6 * * 0'   # Elke zondag 06:00 UTC — keepalive
    - cron: '30 8 * * *'  # Elke dag 08:30 UTC — watchdog controleert of blog al gedraaid heeft
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keepalive — voorkom 60-dagen inactiviteitsdisable
        uses: gautamkrishnar/keepalive-workflow@v2

  watchdog:
    runs-on: ubuntu-latest
    needs: keepalive
    steps:
      - name: Trigger auto-blog als die deze week nog niet heeft gedraaid
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST=$(gh run list --repo ${{ github.repository }} --workflow auto-blog.yml \
            --status completed --limit 1 --json createdAt --jq '.[0].createdAt // "2000-01-01"')
          DAYS=$(( ( $(date +%s) - $(date -d "$LAST" +%s) ) / 86400 ))
          echo "Laatste auto-blog run: $LAST ($DAYS dagen geleden)"
          if [ "$DAYS" -ge 1 ]; then
            echo "Meer dan 1 dag geleden — trigger auto-blog nu"
            gh workflow run auto-blog.yml --repo ${{ github.repository }} --ref main
          else
            echo "Recentelijk gedraaid — geen actie nodig"
          fi
