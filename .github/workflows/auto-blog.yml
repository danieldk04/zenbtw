name: Auto Blog Generator

on:
  # Elke dag 09:00 en 15:00 CEST (07:00 en 13:00 UTC, zomertijd)
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      keyword_override:
        description: 'Override keyword (leave empty to use next from queue)'
        required: false
        type: string

concurrency:
  group: auto-blog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for pending keywords
        id: check_queue
        run: |
          PENDING=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('keywords.json','utf8'));
            const p = d.queue.filter(k=>k.status==='pending');
            console.log(p.length);
          ")
          echo "pending_count=$PENDING" >> $GITHUB_OUTPUT
          if [ "$PENDING" = "0" ]; then
            echo "No pending keywords in queue"
          fi

      - name: Generate blog post
        if: steps.check_queue.outputs.pending_count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
        run: node scripts/generate-blog.js

      - name: Update category structure
        if: steps.check_queue.outputs.pending_count != '0'
        run: node scripts/setup-categories.js && node scripts/fix-mobile.js

      - name: Check if files changed
        id: check_changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push generated files
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "ZenBTW Bot"
          git add blog/*.html sitemap.xml keywords.json
          SLUG=$(jq -r '.published[-1].slug // "unknown"' keywords.json)
          git commit -m "feat: auto-publish blog post ${SLUG}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          PENDING=$(jq '.queue | map(select(.status=="pending")) | length' keywords.json)
          TOTAL=$(jq '.published | length' keywords.json)
          echo "### Blog Post Generation" >> $GITHUB_STEP_SUMMARY
          echo "- **Published total:** $TOTAL posts" >> $GITHUB_STEP_SUMMARY
          echo "- **Keywords remaining:** $PENDING" >> $GITHUB_STEP_SUMMARY
