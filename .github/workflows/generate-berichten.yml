name: Generate Berichten

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install node-fetch@3
      - name: Genereer berichten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ZENBTW_BLOGS }}
        run: node scripts/generate-berichten.js
      - name: Commit
        run: |
          git config user.name "ZENbtw Bot"
          git config user.email "bot@zenbtw.nl"
          git add leads.json
          git diff --staged --quiet || git commit -m "auto: berichten gegenereerd voor bestaande leads [skip ci]"
          git push
