name: ZENbtw Content Agent

on:
  schedule:
    - cron: '0 7 * * 1'  # Elke maandag 07:00 UTC
  workflow_dispatch:       # Ook handmatig te triggeren

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytrends anthropic

      - name: Run content agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ZENBTW_BLOGS }}
        run: python scripts/content_agent.py

      - name: Commit en push nieuwe blog
        run: |
          git config user.name "ZENbtw Content Bot"
          git config user.email "bot@zenbtw.nl"
          git add app/blog/
          git diff --staged --quiet || git commit -m "blog: auto-generated from trending queries $(date +%Y-%m-%d)"
          git push
