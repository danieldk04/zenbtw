name: Regenerate All Blogs

on:
  workflow_dispatch:  # Alleen handmatig triggeren

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Regenerate all blogs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ZENBTW_BLOGS }}
        run: node scripts/regenerate-blogs.js

      - name: Commit en push herschreven blogs
        run: |
          git config user.name "ZenBTW Content Bot"
          git config user.email "bot@zenbtw.nl"
          git add blog/
          git diff --staged --quiet || git commit -m "blog: regenerate all blogs with human-like style + fix truncation $(date +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
