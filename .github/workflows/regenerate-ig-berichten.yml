name: Regenerate Instagram Berichten

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@3
      - name: Regenereer DM-berichten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ZENBTW_BLOGS }}
        run: node scripts/regenerate-ig-berichten.js
      - name: Commit
        run: |
          git config user.name "ZENbtw Bot"
          git config user.email "bot@zenbtw.nl"
          git add instagram-leads.json
          git diff --staged --quiet || git commit -m "auto: instagram DMs hergenereerd met intro-stijl [skip ci]"
          git pull --rebase --autostash origin main
          git push
