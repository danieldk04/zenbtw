name: Backfill Threads Descriptions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backfill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/backfill-threads-descriptions.js

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "ZenBTW Bot"
          git add slides/manifest.json slides/
          git diff --staged --quiet || git commit -m "feat: backfill Threads descriptions for existing slide sets"
          git pull --rebase origin main
          git push
