<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f7f6f3;color:#1a1814;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;width:100%;text-align:center}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:40px;text-decoration:none}
.logo-img{max-height:44px;width:auto;border-radius:8px;object-fit:contain;box-shadow:0 3px 10px rgba(26,71,49,.22)}

.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-home{padding:11px 22px;background:#1a4731;color:#fff;border-radius:9px;text-decoration:none;font-size:14px;font-weight:700;transition:background .15s}
.btn-home:hover{background:#2d6a4f}
.btn-app{padding:11px 22px;background:#fff;color:#1a4731;border:1.5px solid #e8e5de;border-radius:9px;text-decoration:none;font-size:14px;font-weight:600;transition:all .15s}
.btn-app:hover{border-color:#1a4731}

<div class="wrap">
