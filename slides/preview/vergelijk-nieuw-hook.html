<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#f7f6f3;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
</style>
</head>
<body>
<div style="width:1080px;height:1920px;display:flex;flex-direction:column;position:relative;overflow:hidden">
  <!-- Left accent stripe -->
  <div style="position:absolute;left:0;top:0;bottom:0;width:10px;background:#1a4731"></div>
  <!-- Top bar -->
  <div style="height:10px;background:#1a4731;flex-shrink:0"></div>

  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:80px 80px 60px 90px;position:relative;z-index:2">
    <!-- Tag pill -->
    <div style="display:inline-flex;align-items:center;padding:10px 22px;background:#e8f0ec;border-radius:100px;font-size:18px;font-weight:700;color:#1a4731;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:36px">Vinted verkopers</div>

    <h1 style="font-family:'Fraunces',serif;font-size:90px;font-weight:900;line-height:1.06;letter-spacing:-0.03em;color:#1a1814;margin-bottom:36px">
      Je hebt vorig jaar<br>
      €3.400 verdiend<br>
      op Vinted.<br>
      <span style="color:#1a4731">De Belastingdienst<br>weet het ook.</span>
    </h1>
    <p style="font-size:34px;color:#4a4640;line-height:1.5;font-weight:500;max-width:860px;margin-bottom:52px">Wat DAC7 precies rapporteert — en wat jij nu moet doen.</p>
    <div style="display:inline-flex;align-items:center;gap:12px;background:#fff3cd;border:2px solid #f0c040;border-radius:100px;padding:18px 36px;font-size:28px;font-weight:700;color:#7a5c00;width:fit-content">⚠️ Swipe voor de feiten</div>
  </div>

  <!-- Footer with shield logo -->
  <div style="flex-shrink:0;padding:32px 72px;display:flex;align-items:center;justify-content:space-between;border-top:1.5px solid #e8e5de">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:40px;height:40px;background:#1a4731;border-radius:10px;display:flex;align-items:center;justify-content:center">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="#fff"/></svg>
      </div>
      <span style="font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:#1a4731">Zen<span style="color:#2d6a4f">BTW</span></span>
    </div>
    <span style="font-size:20px;color:#8a847a;font-weight:500">zenbtw.nl</span>
  </div>
</div>
</body>
</html>
