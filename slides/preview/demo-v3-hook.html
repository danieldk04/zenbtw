<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;-webkit-font-smoothing:antialiased}
</style>
</head>
<body>
<div style="width:1080px;height:1920px;position:relative;overflow:hidden;background:#f5f3ee">

  <!-- ── Subtiel dot patroon ── -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.035" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="d" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="18" cy="18" r="1.8" fill="#1a4731"/></pattern></defs>
    <rect width="1080" height="1920" fill="url(#d)"/>
  </svg>

  <!-- ── Grote groene cirkel rechtsboven — Daniel staat hierin ── -->
  <div style="position:absolute;top:-140px;right:-140px;width:860px;height:860px;border-radius:50%;background:linear-gradient(145deg,#1a4731 0%,#0e2318 100%)"></div>

  <!-- ── Kleine accent cirkel linksonder ── -->
  <div style="position:absolute;bottom:100px;left:-80px;width:320px;height:320px;border-radius:50%;background:#e8f0ec;opacity:0.5"></div>

  <!-- ── Diagonale scheidingslijn ── -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.07" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="880" x2="1080" y2="780" stroke="#1a4731" stroke-width="2"/>
  </svg>

  <!-- ═══════════════════════════════════
       DANIEL — rechts bovenin, in de groene cirkel
  ═══════════════════════════════════ -->
  <img src="../assets/daniel.png"
       style="position:absolute;top:-20px;right:-60px;width:680px;height:auto;z-index:3;object-fit:cover"
       alt="Daniel - ZenBTW">

  <!-- ── Speech bubble naast Daniel ── -->
  <div style="position:absolute;top:300px;right:480px;z-index:4;background:#fff;border-radius:20px 20px 20px 4px;padding:18px 24px;box-shadow:0 8px 40px rgba(0,0,0,0.14);max-width:220px">
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:19px;font-weight:800;color:#1a1814;line-height:1.3">Weet jij hoeveel<br>jij verdiende? 👀</div>
    <!-- Bubble tail -->
    <div style="position:absolute;left:20px;bottom:-12px;width:0;height:0;border-left:14px solid transparent;border-right:0;border-top:14px solid #fff"></div>
  </div>

  <!-- ── TAG bovenin links ── -->
  <div style="position:absolute;top:68px;left:72px;z-index:5;display:inline-flex;align-items:center;gap:10px;background:#1a4731;border-radius:100px;padding:10px 24px">
    <div style="width:7px;height:7px;border-radius:50%;background:#4ade80"></div>
    <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:#fff;letter-spacing:0.09em;text-transform:uppercase">Vinted verkopers</span>
  </div>

  <!-- ═══════════════════════════════════
       HEADLINE — grote tekst, linksonder
  ═══════════════════════════════════ -->
  <div style="position:absolute;top:700px;left:0;right:0;padding:0 72px;z-index:5">

    <!-- Kleine intro regel -->
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:600;color:#8a847a;margin-bottom:18px;letter-spacing:0.02em">Dit zegt de Belastingdienst over jou →</div>

    <!-- Hoofd headline -->
    <h1 style="font-family:'Fraunces',serif;font-size:110px;font-weight:900;color:#1a1814;line-height:0.95;letter-spacing:-0.04em;margin-bottom:16px">
      Je ver&shy;diende<br>
      <span style="color:#1a4731">€3.400</span><br>
      op Vinted.
    </h1>

    <!-- Tweede statement -->
    <div style="font-family:'Fraunces',serif;font-size:64px;font-weight:700;color:#4a4640;line-height:1.08;margin-bottom:52px">
      Ze weten het <span style="color:#1a4731;border-bottom:4px solid rgba(26,71,49,0.3)">ook.</span>
    </div>

    <!-- Fact strip card -->
    <div style="display:flex;align-items:center;gap:0;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.08);margin-bottom:44px">
      <div style="background:#1a4731;padding:24px 26px;display:flex;align-items:center;flex-shrink:0">
        <span style="font-size:34px">📋</span>
      </div>
      <div style="padding:20px 26px;flex:1">
        <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:21px;font-weight:800;color:#1a1814;margin-bottom:5px">DAC7 is van kracht in heel de EU</div>
        <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;color:#4a4640;font-weight:500">30+ verkopen én €2.000+ omzet = automatische melding</div>
      </div>
    </div>

    <!-- Swipe CTA -->
    <div style="display:inline-flex;align-items:center;gap:16px;background:#fff3cd;border:2.5px solid #f0c040;border-radius:100px;padding:18px 40px">
      <span style="font-size:28px">⚠️</span>
      <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:25px;font-weight:800;color:#7a5c00">Swipe — dit moet je weten</span>
    </div>
  </div>

  <!-- ═══════════════════════════════════
       FOOTER
  ═══════════════════════════════════ -->
  <div style="position:absolute;bottom:0;left:0;right:0;padding:26px 72px;display:flex;align-items:center;justify-content:space-between;background:#f5f3ee;border-top:1.5px solid #e8e3da;z-index:5">
    <div style="display:flex;align-items:center;gap:13px">
      <div style="width:38px;height:38px;background:#1a4731;border-radius:9px;display:flex;align-items:center;justify-content:center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="#fff"/></svg>
      </div>
      <span style="font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:#1a4731">Zen<span style="color:#2d6a4f">BTW</span></span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;color:#8a847a;font-weight:600">zenbtw.nl</span>
      <div style="width:4px;height:4px;border-radius:50%;background:#c8c2b8"></div>
      <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;color:#8a847a;font-weight:600">@zenbtw</span>
    </div>
  </div>

</div>
</body>
</html>
