<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;-webkit-font-smoothing:antialiased}
</style>
</head>
<body>
<div style="width:1080px;height:1920px;position:relative;overflow:hidden;background:#f5f3ee;font-family:'Inter',sans-serif">

  <!-- Dot patroon crème -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.04" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="d" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="1.5" fill="#1a4731"/></pattern></defs>
    <rect width="1080" height="1920" fill="url(#d)"/>
  </svg>

  <!-- Diagonale groene split -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:1120px;background:#1a4731;clip-path:polygon(0 130px,100% 0,100% 100%,0 100%)"></div>

  <!-- Grid in groene sectie -->
  <svg style="position:absolute;bottom:0;left:0;width:100%;height:1120px;opacity:0.03" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="g" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse"><path d="M 64 0 L 0 0 0 64" fill="none" stroke="#fff" stroke-width="0.6"/></pattern></defs>
    <rect width="1080" height="1120" fill="url(#g)"/>
  </svg>

  <!-- Badge linksboven -->
  <div style="position:absolute;top:72px;left:72px;z-index:10;display:inline-flex;align-items:center;gap:10px;background:#1a4731;border-radius:100px;padding:11px 26px">
    <div style="width:7px;height:7px;border-radius:50%;background:#4ade80"></div>
    <span style="font-size:16px;font-weight:800;color:#fff;letter-spacing:0.09em;text-transform:uppercase">Vinted verkopers</span>
  </div>

  <!-- Daniel — kleiner, rechts -->
  <img src="../assets/daniel-presentator.png"
       style="position:absolute;top:50px;right:-20px;width:420px;height:auto;z-index:6"
       alt="Daniel - ZenBTW presentator">

  <!-- Speech bubble — dichter bij Daniels hand (linkerzijde van zijn figuur) -->
  <div style="position:absolute;top:340px;right:370px;z-index:7;background:#fff;border-radius:20px 20px 20px 4px;padding:16px 20px;box-shadow:0 6px 28px rgba(0,0,0,0.10);max-width:220px">
    <div style="font-size:18px;font-weight:700;color:#1a1814;line-height:1.3">Weet jij hoeveel<br>jij verdiende? 👀</div>
    <div style="position:absolute;left:18px;bottom:-12px;width:0;height:0;border-left:13px solid transparent;border-right:0;border-top:13px solid #fff"></div>
  </div>

  <!-- Content onderste sectie -->
  <div style="position:absolute;top:830px;left:0;right:0;padding:0 72px;z-index:8">

    <!-- Subkop -->
    <div style="font-size:19px;font-weight:600;color:rgba(255,255,255,0.48);margin-bottom:20px;letter-spacing:0.02em">Dit zegt de Belastingdienst over jou →</div>

    <!-- Headline Inter 900 -->
    <h1 style="font-size:108px;font-weight:900;color:#fff;line-height:0.92;letter-spacing:-0.04em;margin-bottom:18px">
      Je ver&shy;<br>diende<br>
      <span style="color:#4ade80">€3.400</span><br>
      op Vinted.
    </h1>

    <!-- Tweede deel -->
    <div style="font-size:58px;font-weight:800;color:rgba(255,255,255,0.7);line-height:1.05;margin-bottom:52px;letter-spacing:-0.02em">
      Ze weten het <span style="color:#4ade80">ook.</span>
    </div>

    <!-- Fact card -->
    <div style="display:flex;align-items:stretch;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);border-radius:18px;overflow:hidden;margin-bottom:42px;backdrop-filter:blur(10px)">
      <div style="background:rgba(74,222,128,0.18);padding:24px 26px;display:flex;align-items:center;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.1)">
        <span style="font-size:32px">📋</span>
      </div>
      <div style="padding:22px 26px;flex:1">
        <div style="font-size:19px;font-weight:700;color:#fff;margin-bottom:5px">DAC7 geldt in heel de EU</div>
        <div style="font-size:17px;color:rgba(255,255,255,0.58);font-weight:500;line-height:1.45">30+ verkopen én €2.000+ omzet = automatische melding</div>
      </div>
    </div>

    <!-- Swipe CTA -->
    <div style="display:inline-flex;align-items:center;gap:14px;background:#fff3cd;border:2.5px solid #f0c040;border-radius:100px;padding:17px 40px">
      <span style="font-size:26px">⚠️</span>
      <span style="font-size:24px;font-weight:800;color:#7a5c00">Swipe — dit moet je weten</span>
    </div>
  </div>

  <!-- Footer -->
  <div style="position:absolute;bottom:0;left:0;right:0;padding:24px 72px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.1);z-index:10">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:34px;height:34px;background:rgba(255,255,255,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="rgba(255,255,255,0.8)"/></svg>
      </div>
      <span style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.85)">ZenBTW</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:16px;color:rgba(255,255,255,0.36);font-weight:600">zenbtw.nl</span>
      <div style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.2)"></div>
      <span style="font-size:16px;color:rgba(255,255,255,0.36);font-weight:600">@zenbtw</span>
    </div>
  </div>

</div>
</body>
</html>
